services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vea_econmodels_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/conf.d/opcache-dev.ini:/usr/local/etc/php/conf.d/opcache.ini
    depends_on:
      - db
      - redis
    networks:
      - vea_net

  nginx:
    image: nginx:stable
    container_name: vea_econmodels_nginx
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - vea_net

  db:
    image: timescale/timescaledb:latest-pg16
    container_name: vea_econmodels_db
    restart: always
    networks:
      - vea_net

  redis:
    image: redis:7-alpine
    container_name: vea_econmodels_redis
    restart: always
    networks:
      - vea_net

volumes:
  pg_data:

networks:
  vea_net:
    driver: bridge
